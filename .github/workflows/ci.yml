name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: market_trend
          POSTGRES_USER: market_user
          POSTGRES_PASSWORD: market_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U market_user -d market_trend"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      HF_LOCAL_FILES_ONLY: "1"
      INGESTION_SCHEDULER_ENABLED: "0"
      DATABASE_URL: "postgresql+psycopg://market_user:market_pass@127.0.0.1:5432/market_trend"
      REDIS_URL: "redis://127.0.0.1:6379/0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run Tests
        run: python -m pytest -q

      - name: Compile Sources
        run: python -m compileall src

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint Frontend
        working-directory: frontend
        run: npm run lint

      - name: Build Frontend
        working-directory: frontend
        run: npm run build
