services:
  - type: web
    name: market-trend-api
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.src.api.main:app --host 0.0.0.0 --port $PORT
    
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/backend/data
      sizeGB: 1

    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/backend/src:/opt/render/project/backend:/opt/render/project
      - key: PYTHON_VERSION
        value: 3.12
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: INGESTION_SCHEDULER_ENABLED
        value: "0"
      - key: HF_LOCAL_FILES_ONLY
        value: "1"
      - key: OTEL_ENABLED
        value: "0"
      - key: DISABLE_HEAVY_STARTUP
        value: "1"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: CORS_ORIGINS
        value: https://trendanalyserai.vercel.app